name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - "head"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake
  upstream-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: ruby script/verify_upstream_mappings.rb
  runtime:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec ruby ext/dawn/extconf.rb
        env:
          DAWN_DOWNLOAD_PREBUILT: "1"
      - run: bundle exec rspec
      - run: bundle exec ruby -Ilib examples/dawn_info.rb
      - run: bundle exec ruby -Ilib examples/compute_shader.rb
      - run: bundle exec ruby -Ilib examples/hello_triangle.rb
